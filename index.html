<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .notas-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .nota {
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 200px;
            position: relative;
            cursor: pointer;
        }
        .nota h3 {
            margin: 0 0 10px;
        }
        .nota .menu {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .add-button {
            display: inline-block;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            z-index: 1000;
        }
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
</head>
<body>

    <button class="add-button" onclick="criarNota()">+ Nova Nota</button>
    <div class="notas-container" id="notasContainer"></div>

    <!-- Modal -->
    <div id="modal-overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="modalTitle">Nova Nota</h3>
        <input type="text" id="titulo" placeholder="Título" style="width: 100%;"><br><br>
        <textarea id="conteudo" placeholder="Conteúdo" style="width: 100%; height: 100px;"></textarea><br><br>
        <button onclick="salvarNota()">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
    </div>

    <script>
        let notas = [];
        let editandoId = null;

        function carregarNotas() {
            fetch('notas.php')
                .then(response => response.json())
                .then(data => {
                    notas = data;
                    mostrarNotas();
                });
        }

        function mostrarNotas() {
            const container = document.getElementById('notasContainer');
            container.innerHTML = '';
            notas.forEach(nota => {
                const div = document.createElement('div');
                div.className = 'nota';
                div.onclick = () => abrirEditar(nota.id);
                div.innerHTML = `
                    <h3>${nota.titulo}</h3>
                    <p>${nota.conteudo}</p>
                    <div class="menu">
                        <button onclick="event.stopPropagation(); deletarNota(${nota.id})">Deletar</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function criarNota() {
            editandoId = null;
            document.getElementById('modalTitle').textContent = 'Nova Nota';
            document.getElementById('titulo').value = '';
            document.getElementById('conteudo').value = '';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function abrirEditar(id) {
            const nota = notas.find(n => n.id == id);
            if (!nota) return;
            editandoId = id;
            document.getElementById('modalTitle').textContent = 'Editar Nota';
            document.getElementById('titulo').value = nota.titulo;
            document.getElementById('conteudo').value = nota.conteudo;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function salvarNota() {
            const titulo = document.getElementById('titulo').value;
            const conteudo = document.getElementById('conteudo').value;

            const acao = editandoId ? 'editar' : 'criar';
            fetch('notas.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ titulo, conteudo, acao, id: editandoId || '' })
            }).then(() => {
                carregarNotas();
                fecharModal();
            });
        }

        function deletarNota(id) {
            fetch('notas.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ acao: 'deletar', id })
            }).then(() => carregarNotas());
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        }

        carregarNotas();
    </script>

</body>
</html>
